<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }

        /* Premium Card */
        .video-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; margin-bottom: 25px; 
            border-radius: 20px;
            overflow: hidden;
        }

        /* Thumbnail/Video Styling */
        .media-container {
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .media-container img, .media-container iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button { 
            width: 100%; padding: 12px; border-radius: 12px;
            background: linear-gradient(45deg, #e91e63, #ff4081);
            border: none; color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center;">JJ EMPIRE FEED</h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // ഇപ്പോൾ ഓരോ വീഡിയോയിലും thumbnail-ഉം embedUrl-ഉം ഉണ്ട്
        const allVideos = [
            { id: 1, title: "Cinematic Journey", creator: "Director_A", thumbnail: "https://picsum.photos/500/250", embedUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
            { id: 2, title: "Urban Beats", creator: "Director_B", thumbnail: "https://picsum.photos/500/251", embedUrl: "https://www.youtube.com/embed/tgbNymZ7vqY" }
        ];

        let following = ["Director_A"]; // Test-നായി A-യെ ഫോളോ ചെയ്യുന്നു

        function renderVideos() {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            
            allVideos.filter(v => following.includes(v.creator)).forEach(video => {
                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <div class="media-container">
                        <!-- ഇവിടെ ആദ്യം തമ്പ്നെയിൽ കാണിക്കാം, ക്ലിക്ക് ചെയ്താൽ വീഡിയോ ലോഡ് ചെയ്യാം -->
                        <iframe src="${video.embedUrl}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <h3>${video.title}</h3>
                    <p style="color: #888;">Creator: ${video.creator}</p>
                    <button onclick="alert('Followed!')">Following</button>
                `;
                feed.appendChild(div);
            });
        }

        renderVideos();
    </script>
</body>
</html>

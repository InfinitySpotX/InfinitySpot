<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }

        /* Premium Card */
        .video-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; margin-bottom: 25px; 
            border-radius: 20px;
            overflow: hidden;
        }

        /* Thumbnail/Video Styling */
        .media-container {
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .media-container img, .media-container iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button { 
            width: 100%; padding: 12px; border-radius: 12px;
            background: linear-gradient(45deg, #e91e63, #ff4081);
            border: none; color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center;">JJ EMPIRE FEED</h2>
        <div id="video-feed"></div>
    </div>

    <script>
        // 1. വീഡിയോ ഡാറ്റാബേസ് (ഇത് നിങ്ങളുടെ ഡാറ്റാബേസ് പോലെ പ്രവർത്തിക്കും)
const allVideos = [
    { id: 1, title: "Cinematic Journey", creator: "Jijo", embedUrl: "https://www.youtube.com/embed/Bj6YTLGktnY?si=4jK9ERCVw1Zr_SzZ" },
    { id: 2, title: "Action Movies", creator: "Filmstar", embedUrl: "https://www.youtube.com/embed/OthoLwGgY6o?si=wQPP7Muvs6PMs9JG" },
    { id: 3, title: "Nature Vibes", creator: "Director_C", embedUrl: "https://www.youtube.com/embed/example3" },
    { id: 4, title: "Action Master", creator: "Director_A", embedUrl: "https://www.youtube.com/embed/example4" }
];

// 2. യൂസർ ഫോളോ ചെയ്തിരിക്കുന്നവരുടെ ലിസ്റ്റ്
let following = ["Director_A"]; 

// 3. വീഡിയോകൾ റെൻഡർ ചെയ്യാനുള്ള ഫങ്‌ഷൻ
function renderVideos() {
    const feed = document.getElementById('video-feed');
    feed.innerHTML = '';
    
    // ലോജിക്: ഫോളോ ചെയ്തവരെ ആദ്യം കാണിക്കാൻ സോർട്ടിംഗ് (Sorting)
    const sortedVideos = [...allVideos].sort((a, b) => {
        const isAFollowing = following.includes(a.creator) ? 1 : 0;
        const isBFollowing = following.includes(b.creator) ? 1 : 0;
        return isBFollowing - isAFollowing; // ഇത് ഫോളോ ചെയ്തവരെ ടോപ്പിൽ നിർത്തും
    });

    sortedVideos.forEach(video => {
        const isFollowing = following.includes(video.creator);
        const div = document.createElement('div');
        div.className = 'video-card';
        
        div.innerHTML = `
            <div class="media-container">
                <iframe src="${video.embedUrl}" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3>${video.title}</h3>
            <p style="color: #888;">Creator: ${video.creator}</p>
            <button class="${isFollowing ? 'following' : ''}" onclick="toggleFollow('${video.creator}')">
                ${isFollowing ? 'Following' : 'Follow Creator'}
            </button>
        `;
        feed.appendChild(div);
    });
}

// 4. ഫോളോ ബട്ടൺ പ്രവർത്തിപ്പിക്കാനുള്ള ഫങ്‌ഷൻ
function toggleFollow(creator) {
    if (following.includes(creator)) {
        following = following.filter(f => f !== creator);
    } else {
        following.push(creator);
    }
    renderVideos(); // ഡാറ്റ മാറിയാൽ ലിസ്റ്റ് അപ്‌ഡേറ്റ് ചെയ്യും
}

// ആദ്യമായി പേജ് ലോഡ് ചെയ്യുമ്പോൾ വീഡിയോകൾ കാണിക്കാൻ
renderVideos();

    </script>
</body>
</html>

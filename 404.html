<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(-45deg,#000000,#0d1b2a,#1b263b,#415a77);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:30px;
    text-align:center;
    color:#fff;
    box-shadow:0 10px 35px rgba(0,0,0,.4);
}

.logo{
    font-size:45px;
    margin-bottom:15px;
}

h1{
    margin-bottom:15px;
    font-size:32px;
}

p{
    color:#ddd;
    line-height:1.7;
    margin-bottom:25px;
}

.update{
    display:inline-block;
    background:#ff3b30;
    padding:12px 22px;
    border-radius:30px;
    font-weight:bold;
    margin-bottom:25px;
}

/* Loading Bar */

.loading{
    width:100%;
    height:8px;
    background:#555;
    border-radius:50px;
    overflow:hidden;
    margin:25px auto;
    position:relative;
}

.bar{
    position:absolute;
    left:0;
    top:0;
    width:0%;
    height:100%;
    display:block;
    background:linear-gradient(90deg,#ff0000,#ff7300,#ffffff);
    animation:load 8s linear forwards;
}

@keyframes load{
    0%{
        width:0%;
    }
    100%{
        width:100%;
    }
}

.footer{
    margin-top:18px;
    font-size:13px;
    color:#bbb;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">🚀</div>

<h1>Coming Soon</h1>

<p>
This feature is currently under development.<br><br>
✨ It will be added in the upcoming update.
</p>

<div class="update">
Coming in the Next Update
</div>

<div class="loading">
    <div class="bar"></div>
</div>

<div class="footer">
© Infinity Spot
</div>

</div>

<script>
setTimeout(function(){
    window.location.href = "home.html";
},8000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Spot - Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#0d1b2a,#1b263b,#415a77);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:white;
    box-shadow:0 0 35px rgba(0,0,0,0.5);
}

.logo{
    font-size:45px;
    margin-bottom:15px;
}

h1{
    font-size:32px;
    margin-bottom:15px;
}

p{
    color:#d9d9d9;
    font-size:17px;
    line-height:1.7;
    margin-bottom:25px;
}

.update{
    display:inline-block;
    padding:12px 28px;
    border-radius:30px;
    background:linear-gradient(90deg,#ff4d4d,#ff0000);
    color:white;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* Loading Line */

.loading-line{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.15);
    border-radius:50px;
    overflow:hidden;
    margin:30px auto 10px;
}

.loading-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff6b6b,#bfbfbf);
    animation:fillBar 8s linear forwards;
}

@keyframes fillBar{
    0%{
        width:0%;
    }
    100%{
        width:100%;
    }
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#bfbfbf;
}
</style>

</head>
<body>

<div class="card">

    <div class="logo">🚀</div>

    <h1>Coming Soon</h1>

    <p>
        This feature is currently under development.<br><br>
        ✨ It will be added in the upcoming update.<br>
        Thank you for your patience and support.
    </p>

    <div class="update">
        Coming in the Next Update
    </div>

    <div class="footer">
        © Infinity Spot
    </div>
    <!-- Loading Line -->
    <div class="loading-line">
        <div class="loading-fill"></div>
    </div>

</div>

<script>
setTimeout(function(){
    window.location.href = "home.html";
},8000);
</script>

</body>
</html>

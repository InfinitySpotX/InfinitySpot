<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Spot - Coming Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#000000,#0d1b2a,#1b263b,#415a77);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:min(90%,400px);
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    padding:30px;
    text-align:center;
    color:#fff;
    box-shadow:0 0 35px rgba(0,0,0,.5);
}

.logo{
    font-size:45px;
    margin-bottom:15px;
}

h1{
    font-size:32px;
    margin-bottom:15px;
}

p{
    font-size:17px;
    color:#ddd;
    line-height:1.6;
    margin-bottom:25px;
}

.update{
    display:inline-block;
    padding:12px 24px;
    border-radius:30px;
    background:linear-gradient(90deg,#ff4d4d,#ff0000);
    color:#fff;
    font-weight:bold;
    margin-bottom:25px;
}

/* Loading Bar */

.loading-line{
    width:100%;
    height:8px;
    background:#4a4a4a;
    border-radius:50px;
    overflow:hidden;
}

.loading-fill{
    width:100%;
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff7a00,#ffffff);
    transform-origin:left;
    transform:scaleX(0);
    animation:loading 8s linear forwards;
}

@keyframes loading{
    from{
        transform:scaleX(0);
    }
    to{
        transform:scaleX(1);
    }
}

.footer{
    margin-top:20px;
    color:#bbb;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">🚀</div>

<h1>Coming Soon</h1>

<p>

✨ It will be added in the upcoming update.<br>
Thank you for your patience and support.
</p>

<div class="update">
Coming in the Next Update
</div>

<div class="loading-line">
<div class="loading-fill"></div>
</div>

<div class="footer">
© Infinity Spot
</div>

</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Spot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#000000,#07121d,#14263f,#1b3d5f);
    background-size:400% 400%;
    animation:bg 15s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.hero-bg{
    text-align:center;
}

h1{
    color:#fff;
    font-size:52px;
    font-weight:900;
    letter-spacing:6px;
    text-shadow:0 0 20px rgba(255,255,255,.4);
    animation:title 1.5s ease;
}

@keyframes title{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.start-btn{
    margin-top:45px;
    padding:16px 70px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    letter-spacing:2px;
    background:linear-gradient(90deg,#ff0000,#ff4d4d);
    box-shadow:0 0 20px rgba(255,0,0,.5);
    transition:.25s;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.06);
        box-shadow:0 0 35px rgba(255,0,0,.8);
    }
}

.start-btn.clicked{
    animation:none;
    transform:scale(.9);
    box-shadow:0 0 45px rgba(255,0,0,1);
}

.start-btn:disabled{
    cursor:not-allowed;
}
</style>

</head>
<body>

<div class="hero-bg">

<h1>INFINITY SPOT</h1>

<button class="start-btn" onclick="startApp()">
START
</button>

</div>

<script>
function startApp(){

const btn=document.querySelector(".start-btn");

btn.classList.add("clicked");
btn.innerHTML="LOADING...";
btn.disabled=true;

setTimeout(function(){
localStorage.setItem("opened","true");
window.location.href="home.html";
},700);

}
</script>

</body>
</html>
